name: Java JNI CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate JNI headers
        run: |
          mkdir -p native-headers target/classes
          javac -h native-headers \
            -d target/classes \
            src/main/java/ua/khpi/oop/lab16/NativeBookingStatistics.java

      - name: Build native library
        run: |
          mkdir -p build/native
          clang++ -std=c++17 -shared -fPIC \
            -I"$JAVA_HOME/include" \
            -I"$JAVA_HOME/include/linux" \
            -Inative-headers \
            native/bookingstats.cpp \
            -o build/native/libbookingstats.so

      - name: Build Java project
        run: mvn -q compile

      - name: Run tests
        run: mvn -q test
